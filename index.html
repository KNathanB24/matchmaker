<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matchmaker</title>
</head>

<body>
<h1>Matchmaker</h1>

    <label>Pink Floyd is awesome.</label><br />
    <select id="q1">
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Impartial</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>
    <br /><br />

    <label>The city is better than the country.</label><br />
    <select id="q2">
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Impartial</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>
    <br /><br />

    <label>Physics is the best STEM major.</label><br />
    <select id="q3">
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Impartial</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>
    <br /><br />

    <label>Broccoli is delicious.</label><br />
    <select id="q4">
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Impartial</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>
    <br /><br />

    <label>Winter is the worst season.</label><br />
    <select id="q5">
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Impartial</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>

    <br /><br /><br />
    <button onclick="matchCalculation()">Calculate Matchability Score</button>
    <p id="matchability"></p>



<script>
console.log("Starting Matchmaker...");

// Desired answers for each question
const DESIRED = [5, 2, 4, 1, 5];

function matchCalculation() {
    // Get answers
    let answers = [
        parseInt(document.getElementById("q1").value),
        parseInt(document.getElementById("q2").value),
        parseInt(document.getElementById("q3").value),
        parseInt(document.getElementById("q4").value),
        parseInt(document.getElementById("q5").value)
    ];

    const questions = [
        "Pink Floyd is awesome.",
        "The city is better than the country.",
        "Physics is the best STEM major.",
        "Broccoli is delicious.",
        "Winter is the worst season."
    ];

    let totalDifference = 0;
    let questionDetails = "";

    for (let i = 0; i < answers.length; i++) {
        let diff = Math.abs(answers[i] - DESIRED[i]);
        totalDifference += diff;

        // Question-specific matchability (scale 0-100)
        let questionScore = 100 - (diff * 20);
        questionDetails += questions[i] + " → Matchability: " + questionScore + "%<br>";
    }

    // Display per-question scores
    document.getElementById("questionScores").innerHTML = questionDetails;

    // Total matchability
    let matchabilityScore = 100 - (totalDifference * 4);
    document.getElementById("matchability").innerText =
        "Your total matchability score is: " + matchabilityScore + "%";

    // Threshold messages
    let message = "";
    if (matchabilityScore >= 90) {
        message = "True love at first sight! ❤️";
    } else if (matchabilityScore >= 70 && matchabilityScore <= 89) {
        message = "Let's grab dinner! 🍽️";
    } else if (matchabilityScore >= 60 && matchabilityScore < 70) {
        message = "Howdy, pal! 🤠";
    } else { // below 60
        message = "runs away... 🏃‍♂️";
    }

    // Display threshold message below total score
    document.getElementById("matchability").innerHTML += "<br>" + message;
}
</script>



</body>
</html>
