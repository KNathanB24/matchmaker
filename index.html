<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matchmaker</title>
</head>

<body>
<h1>Matchmaker</h1>

    <label>Pink Floyd is awesome.</label><br />
    <select id="q1">
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Impartial</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>
    <br /><br />

    <label>The city is better than the country.</label><br />
    <select id="q2">
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Impartial</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>
    <br /><br />

    <label>Physics is the best STEM major.</label><br />
    <select id="q3">
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Impartial</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>
    <br /><br />

    <label>Broccoli is delicious.</label><br />
    <select id="q4">
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Impartial</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>
    <br /><br />

    <label>Winter is the worst season.</label><br />
    <select id="q5">
        <option value="5">Strongly Agree</option>
        <option value="4">Agree</option>
        <option value="3">Impartial</option>
        <option value="2">Disagree</option>
        <option value="1">Strongly Disagree</option>
    </select>

    <br /><br /><br />
    <button onclick="matchCalculation()">Calculate Matchability Score</button>
    <p id="matchability"></p>



<script>
    console.log("Starting Matchmaker...");

    // Desired answers for each question
    const DESIRED = [5, 2, 4, 1, 5];

    function matchCalculation() {
        // Get answers
        let q1 = parseInt(document.getElementById("q1").value);
        let q2 = parseInt(document.getElementById("q2").value);
        let q3 = parseInt(document.getElementById("q3").value);
        let q4 = parseInt(document.getElementById("q4").value);
        let q5 = parseInt(document.getElementById("q5").value);

        let answers = [q1, q2, q3, q4, q5];

        let totalDifference = 0;

        // Calculate matchability score
        for (let i = 0; i < answers.length; i++) {
            let difference = Math.abs(answers[i] - DESIRED[i]);
            totalDifference += difference;
        }

        // Convert to score out of 100
        let matchabilityScore = 100 - (totalDifference * 4);

        // Display result
       document.getElementById("matchability").innerText ="Your matchability score is: " + matchabilityScore + "%";
    }
</script>



</body>
</html>
