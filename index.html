<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matchmaker</title>
    <style>
        /* General body styling */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom right, #ffe6f0, #fff0f5);
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ff4da6;
            font-size: 3em;
            margin-bottom: 10px;
        }

        h2 {
            color: #ff1a75;
            margin-top: 30px;
            margin-bottom: 10px;
            text-decoration: underline;
        }

        p {
            font-size: 1.1em;
        }

        /* Question labels and select boxes */
        label {
            font-weight: bold;
            font-size: 1.1em;
        }

        select {
            padding: 5px 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ff4da6;
            font-size: 1em;
        }

        select:focus {
            outline: none;
            border: 2px solid #ff1a75;
        }

        /* Button styling */
        button {
            background-color: #ff4da6;
            color: white;
            font-size: 1.2em;
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 20px;
        }

        button:hover {
            background-color: #ff1a75;
            transform: scale(1.05);
        }

        /* Result boxes */
        #questionScores, #matchability {
            background-color: #fff0f5;
            padding: 15px;
            margin: 10px auto;
            border-radius: 10px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 1.1em;
        }

        /* Emoji styling in message */
        #matchability br + span {
            font-size: 1.5em;
        }
    </style>
</head>

<body>
<h1>Matchmaker</h1>

<!-- User instructions -->
<p>Welcomen to Kyle Bledsoe's Matchmaker! Answer the following statements from 1 (Strongly Disagree) to 5 (Strongly Agree).<br>
Then click the button to see your matchability score and find out if we are meant to be!</p>

<!-- Questions -->
<label>Pink Floyd is awesome.</label><br />
<select id="q1">
    <option value="">Select...</option>
    <option value="5">Strongly Agree</option>
    <option value="4">Agree</option>
    <option value="3">Impartial</option>
    <option value="2">Disagree</option>
    <option value="1">Strongly Disagree</option>
</select>
<br /><br />

<label>The city is better than the country.</label><br />
<select id="q2">
    <option value="">Select...</option>
    <option value="5">Strongly Agree</option>
    <option value="4">Agree</option>
    <option value="3">Impartial</option>
    <option value="2">Disagree</option>
    <option value="1">Strongly Disagree</option>
</select>
<br /><br />

<label>Physics is the best STEM major.</label><br />
<select id="q3">
    <option value="">Select...</option>
    <option value="5">Strongly Agree</option>
    <option value="4">Agree</option>
    <option value="3">Impartial</option>
    <option value="2">Disagree</option>
    <option value="1">Strongly Disagree</option>
</select>
<br /><br />

<label>Broccoli is delicious.</label><br />
<select id="q4">
    <option value="">Select...</option>
    <option value="5">Strongly Agree</option>
    <option value="4">Agree</option>
    <option value="3">Impartial</option>
    <option value="2">Disagree</option>
    <option value="1">Strongly Disagree</option>
</select>
<br /><br />

<label>Winter is the worst season.</label><br />
<select id="q5">
    <option value="">Select...</option>
    <option value="5">Strongly Agree</option>
    <option value="4">Agree</option>
    <option value="3">Impartial</option>
    <option value="2">Disagree</option>
    <option value="1">Strongly Disagree</option>
</select>

<br /><br /><br />

<h2 id="summaryHeader" style="display:none;">Summary</h2>

<div id="questionScores"></div>

<p id="matchability"></p>

<button onclick="matchCalculation()">Calculate Matchability Score</button>

<script>
console.log("Starting Matchmaker...");

// Desired answers for each question
const DESIRED = [5, 2, 4, 1, 5];

// Validation function
function validate(answers) {
    for (let i = 0; i < answers.length; i++) {
        if (isNaN(answers[i]) || answers[i] < 1 || answers[i] > 5) {
            alert("Please answer all questions with a number from 1 to 5!");
            return false;
        }
    }
    return true;
}

function matchCalculation() {
    // Get answers
    let answers = [
        parseInt(document.getElementById("q1").value),
        parseInt(document.getElementById("q2").value),
        parseInt(document.getElementById("q3").value),
        parseInt(document.getElementById("q4").value),
        parseInt(document.getElementById("q5").value)
    ];

    // Validate input
    if (!validate(answers)) {
        return; // Stop if validation fails
    }

    // Show the summary header
    document.getElementById("summaryHeader").style.display = "block";

    const questions = [
        "Pink Floyd is awesome.",
        "The city is better than the country.",
        "Physics is the best STEM major.",
        "Broccoli is delicious.",
        "Winter is the worst season."
    ];

    let totalDifference = 0;
    let questionDetails = "";

    for (let i = 0; i < answers.length; i++) {
        let diff = Math.abs(answers[i] - DESIRED[i]);
        totalDifference += diff;

        // Question-specific matchability (0-100)
        let questionScore = 100 - (diff * 20);
        questionDetails += questions[i] + " → Matchability: " + questionScore + "%<br>";
    }

    // Display per-question scores
    document.getElementById("questionScores").innerHTML = questionDetails;

    // Total matchability
    let matchabilityScore = 100 - (totalDifference * 4);
    document.getElementById("matchability").innerText =
        "Your total matchability score is: " + matchabilityScore + "%";

    // Threshold messages
    let message = "";
    if (matchabilityScore >= 90) {
        message = "True love at first sight! ❤️";
    } else if (matchabilityScore >= 70 && matchabilityScore <= 89) {
        message = "Let's grab dinner! 🍽️";
    } else if (matchabilityScore >= 60 && matchabilityScore < 70) {
        message = "Howdy, pal! 🤠";
    } else { // below 60
        message = "Runs away... 🏃‍♂️";
    }

    // Display threshold message below total score
    document.getElementById("matchability").innerHTML += "<br>" + message;
}
</script>

</body>
</html>
